<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hovedside</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0e0e0e;
      --surface: #1a1a1a;
      --accent: #e8ff47;
      --text: #f0f0f0;
      --muted: #666;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .badge {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.75rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--accent);
      border: 1px solid var(--accent);
      padding: 0.3rem 0.8rem;
      border-radius: 999px;
      margin-bottom: 2rem;
      opacity: 0;
      animation: fadeUp 0.5s ease 0.1s forwards;
    }

    h1 {
      font-family: 'Syne', sans-serif;
      font-size: clamp(2.5rem, 8vw, 5rem);
      font-weight: 800;
      line-height: 1;
      margin-bottom: 1rem;
      opacity: 0;
      animation: fadeUp 0.5s ease 0.2s forwards;
    }

    h1 span { color: var(--accent); }

    .subtitle {
      color: var(--muted);
      font-size: 1.1rem;
      margin-bottom: 3.5rem;
      opacity: 0;
      animation: fadeUp 0.5s ease 0.3s forwards;
    }

    .cards {
      display: flex;
      gap: 1.5rem;
      flex-wrap: wrap;
      justify-content: center;
      opacity: 0;
      animation: fadeUp 0.5s ease 0.4s forwards;
    }

    .card {
      background: var(--surface);
      border: 1px solid #2a2a2a;
      border-radius: 16px;
      padding: 2rem 2.5rem;
      text-decoration: none;
      color: var(--text);
      width: 220px;
      transition: border-color 0.2s, transform 0.2s;
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, var(--accent) 0%, transparent 60%);
      opacity: 0;
      transition: opacity 0.3s;
    }

    .card:hover {
      border-color: var(--accent);
      transform: translateY(-4px);
    }

    .card:hover::before { opacity: 0.06; }

    .card-num {
      font-family: 'Syne', sans-serif;
      font-size: 2.5rem;
      font-weight: 800;
      color: var(--accent);
      margin-bottom: 0.5rem;
    }

    .card-title {
      font-family: 'Syne', sans-serif;
      font-size: 1.2rem;
      font-weight: 700;
      margin-bottom: 0.4rem;
    }

    .card-desc {
      font-size: 0.85rem;
      color: var(--muted);
    }

    footer {
      margin-top: 4rem;
      color: var(--muted);
      font-size: 0.8rem;
      opacity: 0;
      animation: fadeUp 0.5s ease 0.5s forwards;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="badge">🚀 Cloudflare Pages</div>
  <h1>Hoved<span>side</span></h1>
  <p class="subtitle">Velg en underside for å teste</p>

  <div class="cards">
    <a href="side1.html" class="card">
      <div class="card-num">01</div>
      <div class="card-title">Side 1</div>
      <div class="card-desc">Første testside</div>
    </a>
    <a href="side2.html" class="card">
      <div class="card-num">02</div>
      <div class="card-title">Side 2</div>
      <div class="card-desc">Andre testside</div>
    </a>
  </div>

  <footer>index.html · Cloudflare Pages test</footer>
</body>
</html>
