<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Side 2</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0e0e0e;
      --surface: #1a1a1a;
      --accent: #47c8ff;
      --text: #f0f0f0;
      --muted: #666;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
    }

    .page-num {
      font-family: 'Syne', sans-serif;
      font-size: 8rem;
      font-weight: 800;
      color: #1e1e1e;
      position: fixed;
      bottom: -1rem;
      right: 1rem;
      user-select: none;
      pointer-events: none;
    }

    h1 {
      font-family: 'Syne', sans-serif;
      font-size: clamp(2rem, 7vw, 4rem);
      font-weight: 800;
      margin-bottom: 1rem;
      animation: fadeUp 0.5s ease forwards;
    }

    h1 span { color: var(--accent); }

    p {
      color: var(--muted);
      max-width: 400px;
      line-height: 1.6;
      margin-bottom: 2.5rem;
      animation: fadeUp 0.5s ease 0.1s both;
    }

    .box {
      background: var(--surface);
      border: 1px solid #2a2a2a;
      border-radius: 12px;
      padding: 1.5rem 2rem;
      margin-bottom: 2rem;
      font-size: 0.9rem;
      color: var(--muted);
      animation: fadeUp 0.5s ease 0.2s both;
    }

    .box strong { color: var(--accent); }

    .back {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      text-decoration: none;
      color: var(--text);
      font-size: 0.9rem;
      border: 1px solid #333;
      padding: 0.6rem 1.2rem;
      border-radius: 999px;
      transition: border-color 0.2s, color 0.2s;
      animation: fadeUp 0.5s ease 0.3s both;
    }

    .back:hover { border-color: var(--accent); color: var(--accent); }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="page-num">02</div>
  <h1>Du er på <span>Side 2</span></h1>
  <p>Nok en testside. Bruk denne som utgangspunkt for en ny aktivitet, et spill, en oppgave eller annet gamification-innhold.</p>

  <div class="box">
    📄 Fil: <strong>side2.html</strong> &nbsp;·&nbsp; Lenket fra: <strong>index.html</strong>
  </div>

  <a href="index.html" class="back">← Tilbake til hovedsiden</a>
</body>
</html>
